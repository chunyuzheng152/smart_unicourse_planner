</head>

<body>
  <!-- Navbar -->    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="{{ url_for('index')}}">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="logo" width="150" height="60" class="me-3">
        <span>smart unicourse</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index')}}">Home</a>
            </li>

            <li class="nav-item dropdown hover-dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                Majors
            </a>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('computer_science')}}">Computer Science</a></li>
                <li><a class="dropdown-item" href="{{ url_for('data_science')}}">Data Science</a></li>
                <li><a class="dropdown-item" href="{{ url_for('software_engineering')}}">Software Engineering</a></li>
            </ul>
            </li>

            <li class="nav-item">
            <a class="nav-link" href="{{ url_for('survey')}}">Survey</a>

            <li class="nav-item">

        </ul>
        </div>
    </div>
    </nav>

  <!-- Sign Up Form -->
  <section class="py-5 intro-section">
    <div class="container">
      <div class="form-container">
        <h1>Sign Up</h1>
        <p class="text-muted text-center">Please fill in this form to create an account.</p>

        <form method="POST" action="{{ url_for('signup') }}" >
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter email">
          </div>

          <div class="mb-3">
            <label for="psw" class="form-label">Password</label>
            <input type="password" id="psw" name="password" class="form-control" required placeholder="Enter password">
          </div>

          <div class="mb-3">
            <label for="psw-repeat" class="form-label">Repeat Password</label>
            <input type="password" id="psw-repeat" name="repeat_password" class="form-control" required placeholder="Repeat password">
          </div>

          <div class="form-check mb-3">
            <input type="checkbox" id="remember" class="form-check-input" name="remember">
            <label for="remember" class="form-check-label">Remember me</label>
          </div>

          <button type="submit" class="btn custom-btn w-100">Sign Up</button>
        </form>

        <p class="text-center mt-3 mb-0">
          Already have an account?
          <a href="{{ url_for('login')}}">Login</a>
        </p>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
