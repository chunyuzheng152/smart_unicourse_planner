<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <!-- Navbar -->    
  {% include "_navbar.html" %}
  <!-- Sign Up Form -->
  <section class="py-5 intro-section">
    <div class="container">
      <div class="form-container">
        <h1>Sign Up</h1>
        <p class="text-muted text-center">Please fill in this form to create an account.</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-info alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form id="signupForm" method="POST" action="{{ url_for('signup') }}" >
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="Enter username">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter email">
          </div>

          <div class="mb-3">
            <label for="psw" class="form-label">Password</label>
            <input type="password" id="psw" name="password" class="form-control" required placeholder="Enter password">
          </div>

          <div class="mb-3">
            <label for="psw-repeat" class="form-label">Repeat Password</label>
            <input type="password" id="psw-repeat" name="repeat_password" class="form-control" required placeholder="Repeat password">
          </div>

          <div class="form-check mb-3">
            <input type="checkbox" id="remember" class="form-check-input" name="remember">
            <label for="remember" class="form-check-label">Remember me</label>
          </div>

          <div id="passwordError" class="text-danger mb-3">
          </div>

          <button type="submit" class="btn custom-btn w-100">Sign Up</button>
        </form>

        <p class="text-center mt-3 mb-0">
          Already have an account?
          <a href="{{ url_for('login')}}">Login</a>
        </p>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    document.getElementById("signupForm").addEventListener("submit", function(event) {
      const password = document.getElementById("psw").value;
      const repeatPassword = document.getElementById("psw-repeat").value;
      const error = document.getElementById("passwordError");

      error.textContent = "";

      if (password !== repeatPassword) {
        event.preventDefault();
        error.textContent = "Passwords do not match.";
      }
    });
  </script>
</body>
</html>
