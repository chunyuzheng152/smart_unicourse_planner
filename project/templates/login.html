<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <!-- Navbar -->
  {% include "_navbar.html" %}

  <!-- Login Form -->
  <section class="py-5 intro-section">
    <div class="container">
      <div class="form-container">
        <h1>Login</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-info alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method = "POST" action="{{ url_for('login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="usn" class="form-label">Username</label>
            <input type="text" id="usn" name="username" class="form-control" required placeholder="Enter your username">
          </div>

          <div class="mb-3">
            <label for="psw" class="form-label">Password</label>
            <input type="password" id="psw" name="password" class="form-control" required placeholder="Enter your password">
          </div>

          <button type="submit" class="btn custom-btn w-100">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">

          Don't have an account?
          <a href="{{ url_for('signup')}}"> Sign up</a>
        </p>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  
</body>
</html>
