<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="{{ url_for('index')}}">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="logo" width="150" height="60" class="me-3">
        <span>smart unicourse</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index')}}">Home</a>
          </li>

          <li class="nav-item dropdown hover-dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
              Majors
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{{ url_for('computer_science')}}">Computer Science</a></li>
              <li><a class="dropdown-item" href="{{ url_for('data_science')}}">Data Science</a></li>
              <li><a class="dropdown-item" href="{{ url_for('software_engineering')}}">Software Engineering</a></li>
            </ul>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('survey')}}">Survey</a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('login')}}">Login</a>
          </li>

          <li class="nav-item">
              <a class="nav-link avatar-link" href="{{ url_for('settings')}}">
                <span id="navAvatar" class="nav-avatar">U</span>
              </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Form -->
  <section class="py-5 intro-section">
    <div class="container">
      <div class="form-container">
        <h1>Login</h1>

        <form method = "POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label for="usn" class="form-label">Username</label>
            <input type="text" id="usn" name="username" class="form-control" required placeholder="Enter your username">
          </div>

          <div class="mb-3">
            <label for="psw" class="form-label">Password</label>
            <input type="password" id="psw" name="password" class="form-control" required placeholder="Enter your password">
          </div>

          <button type="submit" class="btn custom-btn w-100">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">

          Don't have an account?
          <a href="{{ url_for('signup')}}"> Sign up</a>
        </p>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  
</body>
</html>
